<header class="header">
      <div class="header-inner">
        <a routerLink="/" class="logo">
          <span class="logo-icon">🚂</span>
          <span class="logo-text">STEP<strong>RAILWAY</strong></span>
        </a>
        <nav class="nav">
          <a routerLink="/check-ticket" routerLinkActive="active" class="nav-link">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            ბილეთების შემოწმება
          </a>

          @if (auth.isLoggedIn()) {
            <a routerLink="/profile" routerLinkActive="active" class="nav-link nav-link-user">
              <img [src]="avatarSrc()" class="nav-avatar" alt="avatar"
                   (error)="onAvatarError($event)" />
              {{ auth.currentUser()?.firstName }}
            </a>
            <button class="nav-link nav-link-logout" (click)="signOut()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              გასვლა
            </button>
          } @else {
            <a routerLink="/login" routerLinkActive="active" class="nav-link">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              შესვლა
            </a>
            <a routerLink="/register" class="btn btn-accent btn-sm">რეგისტრაცია</a>
          }
        </nav>
      </div>
    </header>
