<div class="auth-bg">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="auth-logo-icon">🚂</span>
          <span class="auth-logo-text">STEP<strong>RAILWAY</strong></span>
        </div>
        <h1>კეთილი იყოს<br>მობრძანება</h1>
        <p class="auth-sub">შედით თქვენს ანგარიშზე</p>

        <div class="field">
          <label>ელ-ფოსტა</label>
          <input type="email" [(ngModel)]="email" placeholder="john@doe.com" />
        </div>
        <div class="field" style="margin-top:14px">
          <label>პაროლი</label>
          <div class="pass-wrap">
            <input [type]="showPass ? 'text' : 'password'" [(ngModel)]="password"
                   placeholder="••••••••" (keydown.enter)="doSignIn()" />
            <button class="pass-toggle" type="button" (click)="showPass = !showPass">
              {{ showPass ? '🙈' : '👁' }}
            </button>
          </div>
        </div>

        @if (alertMsg()) {
          <div [class]="'auth-alert ' + alertType()">
            {{ alertMsg() }}
          </div>
        }

        <button class="btn btn-accent btn-lg auth-btn"
                [disabled]="loading()" (click)="doSignIn()">
          @if (loading()) { <span class="spinner"></span> გთხოვთ მოიცადოთ... }
          @else { შესვლა }
        </button>

        <p class="auth-switch">
          არ გაქვს ანგარიში?
          <a routerLink="/register">რეგისტრაცია</a>
        </p>
      </div>
    </div>
